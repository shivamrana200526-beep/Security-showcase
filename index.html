<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Security Projects Showcase</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: #fff;
      padding: 48px 20px 64px;
    }

    /* ── Header ── */
    header {
      text-align: center;
      margin-bottom: 40px;
    }

    header .badge {
      display: inline-block;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(8px);
      border-radius: 100px;
      padding: 6px 18px;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #a5b4fc;
      margin-bottom: 20px;
    }

    header h1 {
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 800;
      line-height: 1.15;
      background: linear-gradient(90deg, #e0c3fc, #8ec5fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 16px;
    }

    header p {
      font-size: 1rem;
      color: rgba(255, 255, 255, 0.55);
      max-width: 480px;
      margin: 0 auto;
      line-height: 1.7;
    }

    /* ── Search & Filter Bar ── */
    .controls {
      max-width: 900px;
      margin: 0 auto 36px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }

    .search-wrap {
      flex: 1;
      min-width: 200px;
      position: relative;
    }

    .search-wrap .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1rem;
      pointer-events: none;
      opacity: 0.45;
    }

    #searchInput {
      width: 100%;
      padding: 11px 16px 11px 40px;
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.13);
      border-radius: 12px;
      color: #fff;
      font-family: inherit;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.25s, background 0.25s, box-shadow 0.25s;
    }

    #searchInput::placeholder {
      color: rgba(255, 255, 255, 0.3);
    }

    #searchInput:focus {
      border-color: rgba(139, 92, 246, 0.6);
      background: rgba(255, 255, 255, 0.1);
      box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.18);
    }

    .filter-tags {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .tag {
      padding: 8px 16px;
      border-radius: 100px;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid rgba(255, 255, 255, 0.15);
      background: rgba(255, 255, 255, 0.06);
      color: rgba(255, 255, 255, 0.6);
      transition: all 0.2s ease;
      user-select: none;
      letter-spacing: 0.03em;
    }

    .tag:hover {
      background: rgba(255, 255, 255, 0.12);
      color: #fff;
      border-color: rgba(255, 255, 255, 0.3);
    }

    .tag.active {
      background: linear-gradient(135deg, #8b5cf6, #6366f1);
      border-color: transparent;
      color: #fff;
      box-shadow: 0 4px 12px rgba(139, 92, 246, 0.4);
    }

    /* results count */
    .results-meta {
      max-width: 900px;
      margin: 0 auto 20px;
      font-size: 0.82rem;
      color: rgba(255, 255, 255, 0.35);
      min-height: 20px;
      transition: opacity 0.2s;
    }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 28px;
      max-width: 900px;
      margin: 0 auto;
    }

    @media (max-width: 640px) {
      .grid {
        grid-template-columns: 1fr;
      }
      .controls {
        flex-direction: column;
        align-items: stretch;
      }
    }

    /* ── Empty state ── */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 56px 20px;
      color: rgba(255, 255, 255, 0.3);
    }

    .empty-state .empty-icon {
      font-size: 2.5rem;
      margin-bottom: 12px;
    }

    .empty-state p {
      font-size: 0.95rem;
    }

    /* ── Card ── */
    .card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 32px 28px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      backdrop-filter: blur(12px);
      transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease, background 0.3s ease, opacity 0.25s ease;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(139, 92, 246, 0.12), rgba(59, 130, 246, 0.08));
      opacity: 0;
      transition: opacity 0.3s ease;
      border-radius: inherit;
    }

    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 24px 48px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(139, 92, 246, 0.35);
      border-color: rgba(139, 92, 246, 0.45);
      background: rgba(255, 255, 255, 0.08);
    }

    .card:hover::before {
      opacity: 1;
    }

    .card.hidden {
      display: none;
    }

    /* highlight matched text */
    mark {
      background: rgba(139, 92, 246, 0.35);
      color: #e9d5ff;
      border-radius: 3px;
      padding: 0 2px;
    }

    /* icon area */
    .card-icon {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      flex-shrink: 0;
    }

    .card-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
      position: relative;
    }

    .card-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: #f1f5f9;
      line-height: 1.3;
    }

    .card-student {
      font-size: 0.8rem;
      font-weight: 500;
      color: #a5b4fc;
      letter-spacing: 0.04em;
    }

    .card-student span {
      display: inline-block;
      background: rgba(165, 180, 252, 0.12);
      border: 1px solid rgba(165, 180, 252, 0.2);
      border-radius: 100px;
      padding: 2px 10px;
    }

    .card-description {
      font-size: 0.875rem;
      color: rgba(255, 255, 255, 0.5);
      line-height: 1.65;
      flex: 1;
    }

    .card-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
      padding: 10px 20px;
      border-radius: 10px;
      font-size: 0.85rem;
      font-weight: 600;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: opacity 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
      align-self: flex-start;
      position: relative;
    }

    .card-btn::after {
      content: '→';
      transition: transform 0.2s ease;
    }

    .card-btn:hover::after {
      transform: translateX(4px);
    }

    .card-btn:hover {
      opacity: 0.9;
      transform: scale(1.03);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
    }

    /* ── Card actions row ── */
    .card-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 8px;
      flex-wrap: wrap;
    }

    .copy-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 16px;
      border-radius: 10px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid rgba(255, 255, 255, 0.15);
      background: rgba(255, 255, 255, 0.07);
      color: rgba(255, 255, 255, 0.6);
      transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease, transform 0.2s ease;
      font-family: inherit;
      white-space: nowrap;
    }

    .copy-btn:hover {
      background: rgba(255, 255, 255, 0.13);
      color: #fff;
      border-color: rgba(255, 255, 255, 0.3);
      transform: scale(1.03);
    }

    .copy-btn.copied {
      background: rgba(16, 185, 129, 0.18);
      border-color: rgba(16, 185, 129, 0.4);
      color: #6ee7b7;
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      margin-top: 56px;
      font-size: 0.8rem;
      color: rgba(255, 255, 255, 0.25);
    }
  </style>
</head>
<body>

  <header>
    <div class="badge">Student Capstone Projects · 2025</div>
    <h1>AI Security Projects Showcase 🚀</h1>
    <p>Cutting-edge machine learning projects built to detect deception — across text, audio, and video.</p>
  </header>

  <div class="controls">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input
        type="text"
        id="searchInput"
        placeholder="Search by title, student, or keyword…"
        autocomplete="off"
      />
    </div>
    <div class="filter-tags" id="filterTags"></div>
  </div>

  <div class="results-meta" id="resultsMeta"></div>

  <main>
    <div class="grid" id="projectGrid"></div>
  </main>

  <footer>
    <p>Built with ❤ by the AI &amp; Cybersecurity cohort &nbsp;·&nbsp; 2025</p>
  </footer>

  <script>
    const projects = [
      {
        title: "Fake News Detection",
        student: "Rania Al-Hassan",
        description: "Detects whether a news article is real or fake using machine learning — powered by an NLP pipeline trained on thousands of labeled news sources.",
        link: "https://fake-news-system-eddt.onrender.com",
        icon: "📰",
        tags: ["Text", "NLP"],
        gradient: "linear-gradient(135deg, #f97316, #ef4444)",
        btnGradient: "linear-gradient(135deg, #f97316, #ef4444)",
      },
      {
        title: "Image Forgery Detection using Copy Move and Splicing",
        student: "Khalid Mansour",
        description: "Analyzes digital evidence for authenticity and tampering, using metadata inspection and pixel-level anomaly detection algorithms.",
        link: "https://forensiq-detector.onrender.com",
        icon: "🔬",
        tags: ["Image", "Forensics"],
        gradient: "linear-gradient(135deg, #06b6d4, #3b82f6)",
        btnGradient: "linear-gradient(135deg, #06b6d4, #3b82f6)",
      },
      {
        title: "Fake Voice Detection",
        student: "Sara Al-Otaibi",
        description: "Identifies AI-generated or manipulated voice samples by extracting acoustic features and classifying them with a deep neural network.",
        link: "https://fake-voice-detection-using-ml.vercel.app/",
        icon: "🎙️",
        tags: ["Audio", "Deep Learning"],
        gradient: "linear-gradient(135deg, #8b5cf6, #ec4899)",
        btnGradient: "linear-gradient(135deg, #8b5cf6, #ec4899)",
      },
      {
        title: "Video Forgery Detector",
        student: "Omar Zayed",
        description: "Detects deepfake or altered videos through temporal inconsistency analysis and a CNN-based frame-classification model.",
        link: "https://video-forgery-detector-2.onrender.com/",
        icon: "🎥",
        tags: ["Video", "Deep Learning"],
        gradient: "linear-gradient(135deg, #10b981, #06b6d4)",
        btnGradient: "linear-gradient(135deg, #10b981, #06b6d4)",
      },
    ];

    /* ── collect all unique tags ── */
    const allTags = ["All", ...new Set(projects.flatMap(p => p.tags))];
    let activeTag = "All";
    let searchQuery = "";

    /* ── Build filter tag pills ── */
    const filterTagsEl = document.getElementById("filterTags");
    allTags.forEach(tag => {
      const btn = document.createElement("button");
      btn.className = "tag" + (tag === "All" ? " active" : "");
      btn.textContent = tag;
      btn.dataset.tag = tag;
      btn.addEventListener("click", () => {
        activeTag = tag;
        document.querySelectorAll(".tag").forEach(t => t.classList.remove("active"));
        btn.classList.add("active");
        applyFilters();
      });
      filterTagsEl.appendChild(btn);
    });

    /* ── Render cards once ── */
    const grid = document.getElementById("projectGrid");

    projects.forEach((project, idx) => {
      const card = document.createElement("article");
      card.className = "card";
      card.dataset.index = idx;

      card.innerHTML = `
        <div class="card-icon" style="background: ${project.gradient}">
          ${project.icon}
        </div>
        <div class="card-content">
          <div class="card-title js-title">${project.title}</div>
          <div class="card-student"><span>👤 <span class="js-student">${project.student}</span></span></div>
          <p class="card-description js-desc">${project.description}</p>
          <div class="card-actions">
            <a
              class="card-btn"
              href="${project.link}"
              target="_blank"
              rel="noopener noreferrer"
              style="background: ${project.btnGradient}; color: #fff;"
            >
              Visit Project
            </a>
            <button class="copy-btn" data-link="${project.link}" onclick="copyLink(this)">
              🔗 Copy Link
            </button>
          </div>
        </div>
      `;
      grid.appendChild(card);
    });

    /* ── Copy link ── */
    function copyLink(btn) {
      const link = btn.dataset.link;
      navigator.clipboard.writeText(link).then(() => {
        btn.textContent = "✅ Copied!";
        btn.classList.add("copied");
        setTimeout(() => {
          btn.innerHTML = "🔗 Copy Link";
          btn.classList.remove("copied");
        }, 2000);
      });
    }

    /* ── Highlight helper ── */
    function highlight(text, query) {
      if (!query) return text;
      const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
      return text.replace(new RegExp(`(${escaped})`, "gi"), "<mark>$1</mark>");
    }

    /* ── Filter + highlight ── */
    function applyFilters() {
      const query = searchQuery.trim().toLowerCase();
      const cards = document.querySelectorAll(".card");
      let visible = 0;

      cards.forEach(card => {
        const idx = card.dataset.index;
        const project = projects[idx];

        const tagMatch = activeTag === "All" || project.tags.includes(activeTag);
        const searchMatch =
          !query ||
          project.title.toLowerCase().includes(query) ||
          project.student.toLowerCase().includes(query) ||
          project.description.toLowerCase().includes(query) ||
          project.tags.some(t => t.toLowerCase().includes(query));

        if (tagMatch && searchMatch) {
          card.classList.remove("hidden");
          visible++;

          /* update highlighted text */
          card.querySelector(".js-title").innerHTML = highlight(project.title, searchQuery.trim());
          card.querySelector(".js-student").innerHTML = highlight(project.student, searchQuery.trim());
          card.querySelector(".js-desc").innerHTML = highlight(project.description, searchQuery.trim());
        } else {
          card.classList.add("hidden");
        }
      });

      /* empty state */
      const existing = grid.querySelector(".empty-state");
      if (existing) existing.remove();

      if (visible === 0) {
        const empty = document.createElement("div");
        empty.className = "empty-state";
        empty.innerHTML = `<div class="empty-icon">🔎</div><p>No projects match your search. Try a different keyword or filter.</p>`;
        grid.appendChild(empty);
      }

      /* results meta */
      const meta = document.getElementById("resultsMeta");
      const total = projects.length;
      if (query || activeTag !== "All") {
        meta.textContent = `Showing ${visible} of ${total} project${total !== 1 ? "s" : ""}`;
      } else {
        meta.textContent = "";
      }
    }

    /* ── Search input listener ── */
    document.getElementById("searchInput").addEventListener("input", e => {
      searchQuery = e.target.value;
      applyFilters();
    });
  </script>

</body>
</html>
